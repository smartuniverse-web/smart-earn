    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background-color: #151a25; border-bottom: 1px solid #2a2f3a; position: sticky; top: 0; z-index: 100;}
        .logo { font-weight: bold; color: #f3ba2f; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .back-btn { background: transparent; color: #fff; border: 1px solid #2a2f3a; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;}
        .container { max-width: 500px; margin: 0 auto; padding: 20px 15px; padding-bottom: 50px; }
        .balance-card { background: linear-gradient(135deg, #151a25, #1a1608); border: 1px solid #f3ba2f; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px;}
        .bal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #2a2f3a;}
        .bal-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0;}
        .bal-label { color: #a0a5b1; font-size: 14px; font-weight: bold;}
        .bal-val { font-size: 18px; color: #fff; font-weight: bold;}
        .highlight-val { color: #00ff88; font-size: 28px; text-shadow: 0 0 10px rgba(0,255,136,0.3);}
        .bonus-val { color: #ff4d4d;}
        .lock-warning { background: rgba(255, 77, 77, 0.1); border: 1px solid #ff4d4d; border-radius: 10px; padding: 15px; text-align: center; margin-bottom: 20px; display: none;}
        .lock-warning h4 { color: #ff4d4d; margin-bottom: 5px; font-size: 16px;}
        .lock-warning p { color: #fff; font-size: 12px; margin-bottom: 10px;}
        .btn-dep-small { background: #f3ba2f; color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer;}
        .withdraw-box { background: #151a25; border: 1px solid #2a2f3a; border-radius: 15px; padding: 20px; margin-bottom: 25px;}
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #a0a5b1; margin-bottom: 8px; text-transform: uppercase; font-weight: bold;}
        .amt-input-wrapper { display: flex; align-items: center; background: #0b0e14; border: 1px solid #2a2f3a; border-radius: 10px; overflow: hidden; }
        .amt-input-wrapper span { padding: 15px; color: #00ff88; font-weight: bold; font-size: 18px; background: #1a202c;}
        .custom-input { flex: 1; background: transparent; border: none; padding: 15px; color: #fff; font-size: 18px; font-weight: bold; outline: none; }
        .method-tabs { display: flex; gap: 10px; margin-bottom: 15px;}
        .m-tab { flex: 1; background: #0b0e14; border: 1px solid #2a2f3a; color: #a0a5b1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.3s;}
        .m-tab.active { background: #2a2f3a; color: #f3ba2f; border-color: #f3ba2f;}
        .btn-main { width: 100%; background: #00e676; color: #000; border: none; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0, 230, 118, 0.3); margin-top: 10px;}
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #2a2f3a; color: #a0a5b1; box-shadow: none; cursor: not-allowed;}
        .note { text-align: center; font-size: 11px; color: #a0a5b1; margin-top: 15px; line-height: 1.5;}
        .history-box { background: #151a25; border: 1px solid #2a2f3a; border-radius: 15px; padding: 20px;}
        .hist-title { color: #f3ba2f; font-size: 14px; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; border-bottom: 1px dashed #2a2f3a; padding-bottom: 10px;}
        .hist-row { display: flex; justify-content: space-between; align-items: center; background: #0b0e14; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 3px solid #f3ba2f;}
        .hist-info p { font-size: 13px; color: #fff; font-weight: bold; margin-bottom: 3px;}
        .hist-info small { font-size: 10px; color: #a0a5b1;}
        .hist-amt { font-size: 16px; color: #fff; font-weight: bold;}
        .hist-status { font-size: 11px; background: rgba(243,186,47,0.1); color: #f3ba2f; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-top: 5px;}
    </style>
