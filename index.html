<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Earn - Login & Register</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px 0; }

        .login-container { background: #151a25; border: 1px solid #2a2f3a; border-radius: 20px; padding: 30px 25px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.5); z-index: 1; position: relative; }
        
        .logo { font-size: 26px; font-weight: bold; color: #f3ba2f; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 2px; }
        .subtitle { color: #00ff88; font-size: 13px; font-weight: bold; margin-bottom: 25px; background: rgba(0,255,136,0.1); padding: 5px 10px; border-radius: 5px; display: inline-block;}

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: #a0a5b1; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .custom-input { width: 100%; background: #0b0e14; border: 1px solid #2a2f3a; border-radius: 10px; padding: 14px 15px; color: #fff; font-size: 15px; outline: none; transition: 0.3s; }
        .custom-input:focus { border-color: #f3ba2f; box-shadow: 0 0 10px rgba(243,186,47,0.2); }
        
        .phone-input-wrapper { display: flex; background: #0b0e14; border: 1px solid #2a2f3a; border-radius: 10px; overflow: hidden; }
        .country-code { padding: 14px 15px; background: #1a202c; color: #f3ba2f; font-weight: bold; border-right: 1px solid #2a2f3a; }
        .phone-input-wrapper .custom-input { border: none; border-radius: 0; }

        .btn-main { width: 100%; background: #f3ba2f; color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #555; color: #a0a5b1; cursor: not-allowed; }
        
        .text-link { color: #f3ba2f; font-size: 13px; cursor: pointer; text-decoration: underline; margin-top: 15px; display: inline-block;}
        .text-link:hover { color: #fff; }

        .forgot-link { color: #a0a5b1; font-size: 12px; cursor: pointer; text-decoration: none; margin-top: 10px; display: block; text-align: right;}
        .forgot-link:hover { color: #f3ba2f; text-decoration: underline; }

        /* Sections (Hidden by default except login) */
        #register-section, #forgot-mobile-sec, #forgot-otp-sec, #forgot-newpass-sec { display: none; }
    </style>

    <script>
        // 🔥 यहाँ मैंने आपकी DATABASE URL जोड़ दी है 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyC1X3E6WPLXn1HTWvcP25yUBmKlvraiHHs",
            authDomain: "smart-earn-459ec.firebaseapp.com",
            databaseURL: "https://smart-earn-459ec-default-rtdb.firebaseio.com", 
            projectId: "smart-earn-459ec",
            storageBucket: "smart-earn-459ec.firebasestorage.app",
            messagingSenderId: "314834673807",
            appId: "1:314834673807:web:ac9246bae8910ec57550fa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>
<body>

    <div class="login-container">
        <div class="logo">⚡ Smart Earn</div>
        
        <div id="login-section">
            <div class="subtitle" style="color:#a0a5b1; background:transparent;">Login to Your Account</div>
            
            <div class="input-group">
                <label>Mobile Number OR User ID</label>
                <input type="text" id="log-id" class="custom-input" placeholder="Enter Mobile or SE-XXXX">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="log-pass" class="custom-input" placeholder="Enter your password">
                <a class="forgot-link" onclick="showSection('forgot-mobile-sec')">Forgot Password?</a>
            </div>

            <button class="btn-main" onclick="loginUser()">Login Now</button>
            
            <div class="text-link" onclick="showSection('register-section')">Don't have an account? Register Here</div>
        </div>

        <div id="register-section">
            <div class="subtitle">🎁 Register & Get ₹50 Bonus</div>

            <div class="input-group">
                <label>Full Name *</label>
                <input type="text" id="reg-name" class="custom-input" placeholder="Enter your name">
            </div>

            <div class="input-group">
                <label>Mobile Number *</label>
                <div class="phone-input-wrapper">
                    <div class="country-code">+91</div>
                    <input type="tel" id="reg-mobile" class="custom-input" placeholder="9876543210" maxlength="10">
                </div>
            </div>

            <div class="input-group">
                <label>Create Password *</label>
                <input type="password" id="reg-pass" class="custom-input" placeholder="Create a strong password">
            </div>

            <div class="input-group">
                <label>Referral Code (Optional)</label>
                <input type="text" id="reg-ref" class="custom-input" placeholder="Enter Sponsor ID" style="color: #00ff88; font-weight: bold; text-transform: uppercase;">
            </div>

            <button class="btn-main" id="register-btn" onclick="registerUser()">Register Now</button>
            <div class="text-link" onclick="showSection('login-section')">Already have an account? Login</div>
        </div>

        <div id="forgot-mobile-sec">
            <div class="subtitle" style="color:#ff4d4d; background:rgba(255,77,77,0.1);">Reset Password</div>
            <div class="input-group">
                <label>Registered Mobile Number</label>
                <input type="tel" id="fg-mobile" class="custom-input" placeholder="9876543210" maxlength="10">
            </div>
            <button class="btn-main" onclick="sendForgotOTP()">Get OTP</button>
            <div class="text-link" onclick="showSection('login-section')">Back to Login</div>
        </div>

        <div id="forgot-otp-sec">
            <h3 style="color: #fff; margin-bottom: 10px; font-size: 16px;">Enter OTP</h3>
            <p style="font-size: 12px; color: #a0a5b1; margin-bottom: 15px;">OTP sent to your mobile</p>
            <div class="input-group">
                <input type="number" id="fg-otp" class="custom-input" placeholder="XXXXXX" maxlength="6" style="text-align: center; font-size: 20px; letter-spacing: 5px;">
            </div>
            <button class="btn-main" onclick="verifyForgotOTP()">Verify OTP</button>
        </div>

        <div id="forgot-newpass-sec">
            <h3 style="color: #00ff88; margin-bottom: 15px; font-size: 16px;">Create New Password</h3>
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="fg-new-pass" class="custom-input" placeholder="Enter new password">
            </div>
            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="fg-conf-pass" class="custom-input" placeholder="Confirm new password">
            </div>
            <button class="btn-main" onclick="saveNewPassword()">Update Password</button>
        </div>

    </div>

    <script>
        let tempForgotPhone = ""; 

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const refCode = urlParams.get('ref');
            if(refCode) {
                showSection('register-section');
                document.getElementById('reg-ref').value = refCode.toUpperCase();
                document.getElementById('reg-ref').readOnly = true; 
            }
            
            // Auto Login if user is already registered
            let saved = localStorage.getItem('smartEarnUser');
            if(saved) {
                window.location.href = "game.html";
            }
        };

        function showSection(sectionId) {
            let sections = ['login-section', 'register-section', 'forgot-mobile-sec', 'forgot-otp-sec', 'forgot-newpass-sec'];
            sections.forEach(id => document.getElementById(id).style.display = 'none');
            document.getElementById(sectionId).style.display = 'block';
        }

        function loginUser() {
            let loginId = document.getElementById('log-id').value.trim();
            let loginPass = document.getElementById('log-pass').value;
            if(!loginId || !loginPass) return alert("Please enter both ID/Mobile and Password!");

            let btn = document.querySelector("#login-section .btn-main");
            btn.innerText = "Verifying...";
            btn.disabled = true;

            db.ref('users').once('value').then((snapshot) => {
                let usersObj = snapshot.val() || {};
                let user = Object.values(usersObj).find(u => (u.phone === loginId || u.myRefCode === loginId) && u.password === loginPass);
                
                if(user) {
                    localStorage.setItem('smartEarnUser', JSON.stringify(user));
                    window.location.href = "game.html"; // 🔥 Redirect to Game
                } else { 
                    alert("❌ Invalid Mobile/ID or Password!"); 
                    btn.innerText = "Login Now";
                    btn.disabled = false;
                }
            }).catch(err => {
                alert("Network Error: " + err.message);
                btn.innerText = "Login Now";
                btn.disabled = false;
            });
        }

        function registerUser() {
            let name = document.getElementById("reg-name").value.trim();
            let mobile = document.getElementById("reg-mobile").value.trim();
            let pass = document.getElementById("reg-pass").value;
            let refCode = document.getElementById("reg-ref").value.toUpperCase() || "NONE";

            if(name === "" || mobile.length !== 10 || pass.length < 4) {
                return alert("Please fill all details correctly. Mobile must be 10 digits.");
            }

            let btn = document.getElementById("register-btn");
            btn.innerText = "Creating Account...";
            btn.disabled = true;

            db.ref('users/' + mobile).once('value').then((snapshot) => {
                if(snapshot.exists()) {
                    alert("❌ Number already registered. Please Login.");
                    btn.innerText = "Register Now";
                    btn.disabled = false;
                    return;
                }

                let myUniqueId = "SE-" + Math.floor(1000 + Math.random() * 9000);
                
                let newUser = { 
                    name: name,
                    phone: mobile,
                    password: pass,
                    sponsoredBy: refCode,
                    myRefCode: myUniqueId,
                    inrBalance: 50.00,       
                    hasDeposited: false,     
                    firstDepositDone: false,
                    gameHistory: [], depositHistory: [], withdrawHistory: [],
                    refCommEarned: 0, refBonusEarned: 0,
                    fakeTeam: Math.floor(Math.random() * 50) + 12
                };
                
                db.ref('users/' + mobile).set(newUser).then(() => {
                    localStorage.setItem("smartEarnUser", JSON.stringify(newUser));
                    alert(`🎉 Registration Successful!\n\nYour User ID: ${myUniqueId}\n₹50 Bonus Added!`);
                    window.location.href = "game.html"; // 🔥 Redirect to Game
                }).catch(err => {
                    alert("Failed to save data. Check internet.");
                    btn.innerText = "Register Now";
                    btn.disabled = false;
                });
            }).catch(err => {
                alert("Error connecting to server.");
                btn.innerText = "Register Now";
                btn.disabled = false;
            });
        }

        // FORGOT PASSWORD
        function sendForgotOTP() {
            let mobile = document.getElementById("fg-mobile").value;
            if(mobile.length !== 10) return alert("Enter 10-digit mobile number");

            db.ref('users/' + mobile).once('value').then(s => {
                if(!s.exists()) return alert("❌ User not found!");
                tempForgotPhone = mobile;
                alert("For System Check: OTP is 123456");
                showSection('forgot-otp-sec');
            });
        }
        
        function verifyForgotOTP() { 
            if(document.getElementById('fg-otp').value === "123456") {
                showSection('forgot-newpass-sec'); 
            } else {
                alert("❌ Invalid OTP!");
            }
        }
        
        function saveNewPassword() {
            let newPass = document.getElementById('fg-new-pass').value;
            let confPass = document.getElementById('fg-conf-pass').value;

            if(newPass.length < 4) return alert("Password must be at least 4 characters!");
            if(newPass !== confPass) return alert("Passwords do not match!");

            db.ref('users/' + tempForgotPhone).update({password: newPass})
            .then(() => { 
                alert("✅ Password Updated Successfully!"); 
                showSection('login-section'); 
            });
        }
    </script>
</body>
</html>
