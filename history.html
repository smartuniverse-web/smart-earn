<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Earn - Game History</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; padding-bottom: 70px;}

        header { padding: 15px 20px; background-color: #151a25; border-bottom: 1px solid #2a2f3a; text-align: center; position: sticky; top: 0; z-index: 100;}
        .logo { font-weight: bold; color: #f3ba2f; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;}

        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }

        .page-title { color: #a0a5b1; font-size: 14px; text-transform: uppercase; font-weight: bold; margin-bottom: 20px; text-align: center; border-bottom: 1px dashed #2a2f3a; padding-bottom: 10px;}

        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .hist-card { background: #151a25; border: 1px solid #2a2f3a; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .hist-card.win { border-left: 4px solid #00ff88; }
        .hist-card.lose { border-left: 4px solid #ff4d4d; }

        .hist-left p { font-size: 14px; color: #fff; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;}
        .hist-left small { font-size: 11px; color: #a0a5b1; display: block;}
        
        .hist-right { text-align: right; }
        .hist-right .amt { font-size: 16px; font-weight: bold; margin-bottom: 5px;}
        .win .amt { color: #00ff88; }
        .lose .amt { color: #ff4d4d; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase;}
        .win .badge { background: rgba(0,255,136,0.1); color: #00ff88; }
        .lose .badge { background: rgba(255,77,77,0.1); color: #ff4d4d; }

        .empty-state { text-align: center; color: #a0a5b1; margin-top: 50px; font-size: 14px;}

        /* BOTTOM NAV - ONLY 4 ITEMS AS REQUESTED */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #151a25; border-top: 1px solid #2a2f3a; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000;}
        .nav-item { text-align: center; color: #a0a5b1; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase;}
        .nav-item.active { color: #f3ba2f; }
        .nav-icon { font-size: 22px; margin-bottom: 3px; display: block;}
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC1X3E6WPLXn1HTWvcP25yUBmKlvraiHHs",
            authDomain: "smart-earn-459ec.firebaseapp.com",
            projectId: "smart-earn-459ec",
            storageBucket: "smart-earn-459ec.firebasestorage.app",
            messagingSenderId: "314834673807",
            appId: "1:314834673807:web:ac9246bae8910ec57550fa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>
<body>

    <header>
        <div class="logo">📜 Game History</div>
    </header>

    <div class="container">
        <div class="page-title">Your Lifetime Bets</div>
        
        <div class="history-list" id="history-container">
            <div style="text-align:center; color:#f3ba2f; font-size:12px; margin-top:20px;">Loading Lifetime History...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='game.html'">
            <span class="nav-icon">🎮</span>Game
        </div>
        <div class="nav-item" onclick="window.location.href='referral.html'">
            <span class="nav-icon">👥</span>Referral
        </div>
        <div class="nav-item active" onclick="window.location.href='history.html'">
            <span class="nav-icon">📜</span>History
        </div>
        <div class="nav-item" onclick="window.location.href='profile.html'">
            <span class="nav-icon">👤</span>Menu
        </div>
    </div>

    <script>
        window.onload = function() {
            let saved = localStorage.getItem('smartEarnUser');
            if(!saved) { window.location.href = "index.html"; return; }
            let localUserData = JSON.parse(saved);

            let container = document.getElementById('history-container');

            // 🔥 FETCH LIFETIME HISTORY DIRECTLY FROM FIREBASE 🔥
            if(localUserData.phone) {
                db.ref('users/' + localUserData.phone).once('value').then((snapshot) => {
                    if(snapshot.exists()) {
                        let userData = snapshot.val();
                        localStorage.setItem('smartEarnUser', JSON.stringify(userData));
                        renderHistoryList(userData.gameHistory, container);
                    } else {
                        renderHistoryList(localUserData.gameHistory, container);
                    }
                }).catch(error => {
                    renderHistoryList(localUserData.gameHistory, container);
                });
            } else {
                renderHistoryList(localUserData.gameHistory, container);
            }
        };

        function renderHistoryList(historyArray, container) {
            if(!historyArray || historyArray.length === 0) {
                container.innerHTML = `<div class="empty-state">🎮 No games played yet.<br><br><button style="background:#f3ba2f; color:#000; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; margin-top:15px;" onclick="window.location.href='game.html'">Play Now</button></div>`;
                return;
            }

            container.innerHTML = ""; 

            // Reverse Loop: सबसे ताज़ा (Latest) गेम सबसे ऊपर दिखेगी, और नीचे स्क्रॉल करने पर पुरानी गेम्स।
            for(let i = historyArray.length - 1; i >= 0; i--) {
                let game = historyArray[i];
                let isWin = game.result === "Win";
                let cardClass = isWin ? "win" : "lose";
                let sign = isWin ? "+" : "-";
                let displayAmt = isWin ? game.profit : game.amount;

                let html = `
                <div class="hist-card ${cardClass}">
                    <div class="hist-left">
                        <p>Bet on: ${game.betOn}</p>
                        <small>Timeframe: ${game.timeframe}s</small>
                        <small>${game.date}</small>
                    </div>
                    <div class="hist-right">
                        <div class="amt">${sign}₹${displayAmt.toFixed(2)}</div>
                        <span class="badge">${game.result}</span>
                    </div>
                </div>`;
                
                container.innerHTML += html;
            }
        }
    </script>
</body>
</html>
