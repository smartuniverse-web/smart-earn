    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; padding-bottom: 70px;}
        header { padding: 15px 20px; background-color: #151a25; border-bottom: 1px solid #2a2f3a; text-align: center; position: sticky; top: 0; z-index: 100;}
        .logo { font-weight: bold; color: #f3ba2f; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }
        .link-box { background: #151a25; border: 1px dashed #f3ba2f; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(243,186,47,0.1);}
        .link-title { color: #a0a5b1; font-size: 13px; text-transform: uppercase; font-weight: bold; margin-bottom: 10px;}
        .ref-link { background: #0b0e14; padding: 12px; border-radius: 8px; font-size: 14px; color: #00ff88; font-family: monospace; word-break: break-all; margin-bottom: 15px;}
        .copy-btn { background: #f3ba2f; color: #000; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; width: 100%;}
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;}
        .stat-card { background: #151a25; border: 1px solid #2a2f3a; padding: 15px; border-radius: 12px; text-align: center;}
        .stat-card h4 { color: #a0a5b1; font-size: 12px; text-transform: uppercase; margin-bottom: 5px;}
        .stat-card h2 { color: #fff; font-size: 24px;}
        .stat-card span { color: #00ff88; font-size: 11px;}
        .earning-box { background: linear-gradient(135deg, #151a25, #1a1608); border: 1px solid #f3ba2f; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 25px;}
        .earning-title { color: #a0a5b1; font-size: 14px; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;}
        .earning-amt { font-size: 35px; color: #f3ba2f; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 10px rgba(243,186,47,0.3);}
        .withdrawn-text { font-size: 12px; color: #a0a5b1; margin-bottom: 20px; font-weight: bold;}
        .four-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;}
        .grid-box { background: #0b0e14; border: 1px solid #2a2f3a; border-radius: 10px; padding: 12px; text-align: center;}
        .grid-label { font-size: 10px; color: #a0a5b1; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;}
        .grid-val { font-size: 16px; color: #00ff88; font-weight: bold;}
        .grid-val.blue { color: #2196F3; }
        .grid-val.yellow { color: #f3ba2f; }
        .grid-val.white { color: #fff; }
        .transfer-btn { width: 100%; background: #2196F3; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);}
        .transfer-btn:active { transform: scale(0.98); }
        .comm-list { background: #151a25; border: 1px solid #2a2f3a; border-radius: 12px; padding: 15px;}
        .comm-list h3 { color: #fff; font-size: 14px; margin-bottom: 15px; border-bottom: 1px dashed #2a2f3a; padding-bottom: 10px; display: flex; justify-content: space-between;}
        .comm-row { display: flex; justify-content: space-between; padding: 10px; background: #0b0e14; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #00ff88; align-items: center;}
        .comm-row.bonus { border-left: 3px solid #f3ba2f; background: rgba(243,186,47,0.05);}
        .comm-row.team { border-left: 3px solid #2196F3; background: rgba(33, 150, 243, 0.05);}
        .comm-user { color: #a0a5b1; font-size: 13px; font-weight: bold;}
        .comm-desc { font-size: 11px; color: #fff;}
        .comm-amt { color: #00ff88; font-weight: bold; font-size: 14px; text-align: right;}
        .comm-amt.bonus-color { color: #f3ba2f; }
        .comm-amt.team-color { color: #2196F3; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #151a25; border-top: 1px solid #2a2f3a; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000;}
        .nav-item { text-align: center; color: #a0a5b1; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase;}
        .nav-item.active { color: #f3ba2f; }
        .nav-icon { font-size: 22px; margin-bottom: 3px; display: block;}
    </style>
