<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Earn - Profile Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; padding-bottom: 70px;}

        header { padding: 15px 20px; background-color: #151a25; border-bottom: 1px solid #2a2f3a; text-align: center; position: sticky; top: 0; z-index: 100;}
        .logo { font-weight: bold; color: #f3ba2f; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;}

        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }

        /* User Info Box */
        .user-profile { background: #151a25; border: 1px solid #2a2f3a; border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #f3ba2f, #f48c06); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #000;}
        .user-details h2 { color: #fff; font-size: 18px; margin-bottom: 5px;}
        .user-details p { color: #a0a5b1; font-size: 13px; font-weight: bold; margin-bottom: 3px;}
        .user-id { background: rgba(243,186,47,0.1); color: #f3ba2f; padding: 3px 8px; border-radius: 5px; font-size: 11px; display: inline-block;}

        /* Wallet Box */
        .wallet-card { background: linear-gradient(135deg, #151a25, #1a1608); border: 1px solid #f3ba2f; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 25px;}
        .bal-amt { color: #00ff88; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,136,0.3); margin-bottom: 15px;}
        .wallet-actions { display: flex; gap: 10px; }
        .action-btn-sm { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; border: none; text-transform: uppercase;}
        .btn-dep { background: #f3ba2f; color: #000; }
        .btn-wit { background: transparent; color: #fff; border: 1px solid #a0a5b1; }

        /* Menu List */
        .menu-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;}
        .menu-item { background: #151a25; border: 1px solid #2a2f3a; border-radius: 10px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;}
        .menu-item:active { background: #2a2f3a; }
        .menu-left { display: flex; align-items: center; gap: 15px; font-size: 15px; color: #fff; font-weight: bold;}
        .menu-icon { font-size: 18px;}
        .arrow { color: #a0a5b1; font-size: 14px;}

        .btn-logout { width: 100%; background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; transition: 0.3s;}
        .btn-logout:active { background: #ff4d4d; color: #fff;}

        /* BOTTOM NAVIGATION BAR */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #151a25; border-top: 1px solid #2a2f3a; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000;}
        .nav-item { text-align: center; color: #a0a5b1; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase;}
        .nav-item.active { color: #f3ba2f; }
        .nav-icon { font-size: 22px; margin-bottom: 3px; display: block;}
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC1X3E6WPLXn1HTWvcP25yUBmKlvraiHHs",
            authDomain: "smart-earn-459ec.firebaseapp.com",
            projectId: "smart-earn-459ec",
            storageBucket: "smart-earn-459ec.firebasestorage.app",
            messagingSenderId: "314834673807",
            appId: "1:314834673807:web:ac9246bae8910ec57550fa"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>
</head>
<body>

    <header>
        <div class="logo">👤 Profile</div>
    </header>

    <div class="container">
        
        <div class="user-profile">
            <div class="avatar" id="avatar-letter">S</div>
            <div class="user-details">
                <h2 id="u-name">User Name</h2>
                <p id="u-phone">+91 9876543210</p>
                <div class="user-id" id="u-id">ID: Loading...</div>
            </div>
        </div>

        <div class="wallet-card">
            <div style="color: #a0a5b1; font-size: 12px; margin-bottom: 5px; font-weight: bold; text-transform: uppercase;">Total Balance</div>
            <div class="bal-amt" id="u-bal">₹0.00</div>
            <div class="wallet-actions">
                <button class="action-btn-sm btn-dep" onclick="window.location.href='deposit.html'">Deposit</button>
                <button class="action-btn-sm btn-wit" onclick="window.location.href='withdraw.html'">Withdraw</button>
            </div>
        </div>

        <div class="menu-list">
            <div class="menu-item" onclick="window.location.href='history.html'">
                <div class="menu-left"><span class="menu-icon">📜</span> Game History</div>
                <div class="arrow">➔</div>
            </div>
            <div class="menu-item" onclick="window.location.href='referral.html'">
                <div class="menu-left"><span class="menu-icon">👥</span> Referral Team</div>
                <div class="arrow">➔</div>
            </div>
            <div class="menu-item" onclick="alert('Settings Page Coming Soon!')">
                <div class="menu-left"><span class="menu-icon">⚙️</span> Settings</div>
                <div class="arrow">➔</div>
            </div>
            <div class="menu-item" onclick="alert('Privacy Policy Document')">
                <div class="menu-left"><span class="menu-icon">📄</span> Privacy Policy</div>
                <div class="arrow">➔</div>
            </div>
            <div class="menu-item" onclick="alert('Terms and Conditions')">
                <div class="menu-left"><span class="menu-icon">📝</span> Terms & Conditions</div>
                <div class="arrow">➔</div>
            </div>
        </div>

        <button class="btn-logout" onclick="logout()">🚪 Log Out</button>

    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='game.html'">
            <span class="nav-icon">🎮</span>Game
        </div>
        <div class="nav-item" onclick="window.location.href='referral.html'">
            <span class="nav-icon">👥</span>Referral
        </div>
        <div class="nav-item" onclick="window.location.href='history.html'">
            <span class="nav-icon">📜</span>History
        </div>
        <div class="nav-item active" onclick="window.location.href='profile.html'">
            <span class="nav-icon">👤</span>Menu
        </div>
    </div>

    <script>
        window.onload = function() {
            let saved = localStorage.getItem('smartEarnUser');
            if(!saved) { window.location.href = "index.html"; return; }
            let localUserData = JSON.parse(saved);

            function updateUI(userData) {
                document.getElementById('u-name').innerText = userData.name || "Smart Player";
                document.getElementById('u-phone').innerText = "+91 " + (userData.phone || "XXX");
                document.getElementById('u-id').innerText = "ID: " + userData.myRefCode;
                document.getElementById('u-bal').innerText = "₹" + userData.inrBalance.toFixed(2);
                
                if(userData.name) {
                    document.getElementById('avatar-letter').innerText = userData.name.charAt(0).toUpperCase();
                }
            }

            // पहले फोन वाला डेटा दिखाएँ (ताकि पेज जल्दी लोड हो)
            updateUI(localUserData);

            // 🔥 FIREBASE से ताज़ा डेटा लेकर अपडेट करें 🔥
            if(localUserData.phone) {
                db.ref('users/' + localUserData.phone).once('value').then((snapshot) => {
                    if(snapshot.exists()) {
                        let freshData = snapshot.val();
                        localStorage.setItem('smartEarnUser', JSON.stringify(freshData));
                        updateUI(freshData); // बैलेंस को लाइव अपडेट करें
                    }
                }).catch(err => console.log("Sync Error", err));
            }
        };

        function logout() {
            let confirmLogout = confirm("Are you sure you want to log out?");
            if(confirmLogout) {
                localStorage.removeItem('smartEarnUser');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
