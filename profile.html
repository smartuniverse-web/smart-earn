<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Earn - Profile Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0b0e14; color: #e2e8f0; padding-bottom: 70px;}
        header { padding: 15px 20px; background-color: #151a25; border-bottom: 1px solid #2a2f3a; text-align: center; position: sticky; top: 0; z-index: 100;}
        .logo { font-weight: bold; color: #f3ba2f; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;}
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px; }
        .user-profile { background: #151a25; border: 1px solid #2a2f3a; border-radius: 15px; padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .avatar { width: 60px; height: 60px; background: linear-gradient(135deg, #f3ba2f, #f48c06); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; color: #000;}
        .user-details h2 { color: #fff; font-size: 18px; margin-bottom: 5px;}
        .user-details p { color: #a0a5b1; font-size: 13px; font-weight: bold; margin-bottom: 3px;}
        .user-id { background: rgba(243,186,47,0.1); color: #f3ba2f; padding: 3px 8px; border-radius: 5px; font-size: 11px; display: inline-block;}
        .wallet-card { background: linear-gradient(135deg, #151a25, #1a1608); border: 1px solid #f3ba2f; border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 25px;}
        .bal-amt { color: #00ff88; font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,136,0.3); margin-bottom: 15px;}
        .wallet-actions { display: flex; gap: 10px; }
        .action-btn-sm { flex: 1; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 13px; border: none; text-transform: uppercase;}
        .btn-dep { background: #f3ba2f; color: #000; }
        .btn-wit { background: transparent; color: #fff; border: 1px solid #a0a5b1; }
        .menu-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;}
        .menu-item { background: #151a25; border: 1px solid #2a2f3a; border-radius: 10px; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;}
        .menu-item:active { background: #2a2f3a; }
        .menu-left { display: flex; align-items: center; gap: 15px; font-size: 15px; color: #fff; font-weight: bold;}
        .menu-icon { font-size: 18px;}
        .arrow { color: #a0a5b1; font-size: 14px;}
        .btn-logout { width: 100%; background: transparent; color: #ff4d4d; border: 1px solid #ff4d4d; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; transition: 0.3s;}
        .btn-logout:active { background: #ff4d4d; color: #fff;}
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #151a25; border-top: 1px solid #2a2f3a; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000;}
        .nav-item { text-align: center; color: #a0a5b1; font-size: 11px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase;}
        .nav-item.active { color: #f3ba2f; }
        .nav-icon { font-size: 22px; margin-bottom: 3px; display: block;}
        .full-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; z-index: 2000; display: none; flex-direction: column; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        .popup-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #151a25; border-bottom: 1px solid #2a2f3a; position: sticky; top: 0;}
        .popup-title-bar { font-size: 18px; color: #f3ba2f; font-weight: bold; text-transform: uppercase;}
        .close-btn { color: #ff4d4d; font-size: 28px; font-weight: bold; cursor: pointer; line-height: 1;}
        .popup-body { padding: 20px; color: #a0a5b1; font-size: 14px; line-height: 1.6;}
        .contact-box { background: #151a25; border: 1px solid #2a2f3a; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center;}
        .contact-box a { color: #00ff88; text-decoration: none; font-weight: bold; font-size: 16px;}
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 12px; color: #fff; margin-bottom: 8px; text-transform: uppercase; font-weight: bold;}
        .custom-input { width: 100%; background: #151a25; border: 1px solid #2a2f3a; padding: 12px; color: #fff; font-size: 14px; border-radius: 8px; outline: none; }
        .custom-input:focus { border-color: #f3ba2f;}
        .file-input { width: 100%; background: #151a25; border: 1px dashed #2a2f3a; padding: 10px; color: #a0a5b1; border-radius: 8px; font-size: 12px;}
        .btn-main { width: 100%; background: #2196F3; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px;}
        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { background: #2a2f3a; color: #a0a5b1;}
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>

</head>
<body>
    <header><div class="logo">👤 Profile</div></header>
    <div class="container">
        <div class="user-profile">
            <div class="avatar" id="avatar-letter">S</div>
            <div class="user-details">
                <h2 id="u-name">User Name</h2>

                <div class="arrow">➔</div>
            </div>
            <div class="menu-item" onclick="openPopup('privacyPopup')">
                <div class="menu-left"><span class="menu-icon">🔒</span> Privacy Policy</div>

            </div>
            <div class="menu-item" onclick="openPopup('tcPopup')">
                <div class="menu-left"><span class="menu-icon">📝</span> Terms & Conditions</div>

            </div>
        </div>
        <button class="btn-logout" onclick="logout()">🚪 Log Out</button>
    </div>
    <div class="bottom-nav">

        <div class="nav-item active" onclick="window.location.href='profile.html'"><span class="nav-icon">👤</span>Menu</div>
